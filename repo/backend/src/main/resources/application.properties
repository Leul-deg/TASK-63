spring.application.name=reslife-api
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# -----------------------------------------------------------------------
# AES-256-GCM field-level encryption
# Key must decode to exactly 32 bytes.
# REQUIRED: export RESLIFE_ENCRYPTION_KEY=$(openssl rand -base64 32)
# -----------------------------------------------------------------------
app.encryption.key=${RESLIFE_ENCRYPTION_KEY}

# Spring Session JDBC — tables are created by Flyway (V2), not by Spring Session itself
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
spring.session.timeout=1800s

# Session cookie settings
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
# Local development may override this in application-local.properties
server.servlet.session.cookie.secure=true

# -----------------------------------------------------------------------
# File upload — agreement attachment storage
# OVERRIDE in production: export RESLIFE_UPLOAD_DIR=/var/reslife/uploads
# -----------------------------------------------------------------------
app.storage.upload-dir=${RESLIFE_UPLOAD_DIR:./uploads}

# Raise multipart limits to accommodate the 15 MB attachment maximum.
# Spring Boot defaults to 1 MB; both limits must be set.
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=16MB

# -----------------------------------------------------------------------
# Multi-source data collection engine
# -----------------------------------------------------------------------
reslife.crawler.max-concurrent=5
reslife.crawler.fetch-timeout-seconds=30
reslife.crawler.checkpoint-interval-pages=10
reslife.crawler.user-agent=ResLife-Crawler/1.0
