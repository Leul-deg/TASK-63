version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reslife
      POSTGRES_USER: reslife
      POSTGRES_PASSWORD: secret123
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reslife -d reslife"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reslife
      SPRING_DATASOURCE_USERNAME: reslife
      SPRING_DATASOURCE_PASSWORD: secret123
      # Generate a stable key for local dev: openssl rand -base64 32
      # IMPORTANT: in production, inject this via a secret manager — never commit it.
      RESLIFE_ENCRYPTION_KEY: ${RESLIFE_ENCRYPTION_KEY:-dGhpcyBpcyBhIGxvY2FsLWRldiBwbGFjZWhvbGRlcgo=}
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
